<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ULTRABOARD - WANDA FARM</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            /* Background layar diubah menjadi putih */
            background-color: #ffffff;
        }
        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            z-index: 1;
        }
        /* Loader dengan teks Hijau Tosca */
        #loader {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            /* Warna Hijau Tosca */
            color: #008080;
            font-family: Arial, sans-serif;
            text-align: center;
            font-weight: bold;
            z-index: 2;
        }
    </style>
</head>
<body>
    <div id="loader">Memuat Aplikasi Mohon Tunggu...</div>
    
    <iframe 
        src="https://script.google.com/macros/s/AKfycbw3oeDDJw2W5Y-eAdrHHRV5NsPKpUXax1nIHTdxTTpJ8ejENf_j03SLxO5HpNAJgEde/exec" 
        onload="document.getElementById('loader').style.display='none';">
    </iframe>
</body>
</html>
